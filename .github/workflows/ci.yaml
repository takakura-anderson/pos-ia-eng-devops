name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start Environment
        run: make up

      - name: Wait for Environment Health
        run: |
          echo "Waiting for services to be healthy..."
          sleep 10

      - name: Check Ruff Linting & Formatting
        run: make lint

      - name: Run Pytest
        run: make test

      - name: Run Data Quality Checks (Great Expectations)
        run: make data-quality

      - name: Vulnerability Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'fastapi-cnpj:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Stop Environment
        if: always()
        run: make down
